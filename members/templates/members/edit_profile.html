<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Gym Management System</title>
</head>
<body>
    <h1>Edit Profile</h1>
    <p>Update your personal and fitness details below.</p>

    <form>
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname"><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="text" id="phone" name="phone"><br><br>

        <label for="goal">Fitness Goal:</label><br>
        <input type="text" id="goal" name="goal"><br><br>

        <label for="experience">Experience Level:</label><br>
        <select id="experience" name="experience">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select><br><br>

        <button type="submit">Save Changes</button>
    </form>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
