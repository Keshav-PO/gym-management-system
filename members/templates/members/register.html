{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gym Management System</title>
    <link rel="stylesheet" href="{% static 'members/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Register Account</h1>
        <p>Create your gym member account below.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>

        <a class="back-link" href="/">Back to Home</a>
    </div>
</body>
</html>
