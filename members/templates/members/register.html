{% extends 'public_base.html' %}

{% block title %}Register | FitZone Gym{% endblock %}

{% block content %}
<section class="page-section">
    <div class="form-card">
        <h2>Create Account</h2>
        <p>Join FitZone Gym and start your fitness journey.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>

        <div class="helper-text">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </div>
    </div>
</section>
{% endblock %}
