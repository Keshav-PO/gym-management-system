{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Gym Management System</title>
    <link rel="stylesheet" href="{% static 'members/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Reset Password</h1>
        <p>Enter your registered email address and a new password.</p>

        <form method="post">
            {% csrf_token %}

            <label for="email">Email:</label>
            <input type="email" id="email" name="email">

            <label for="new_password">New Password:</label>
            <input type="password" id="new_password" name="new_password">

            {% if success_message %}
                <p style="color: green; text-align: left;">{{ success_message }}</p>
            {% endif %}

            {% if error_message %}
                <p style="color: red; text-align: left;">{{ error_message }}</p>
            {% endif %}

            <button type="submit">Reset Password</button>
        </form>

        <a class="back-link" href="/">Back to Home</a>
    </div>
</body>
</html>
