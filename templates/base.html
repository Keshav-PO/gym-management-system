<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gym Management System{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #1f2937;
            color: white;
            padding: 20px 0;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 22px;
        }

        .sidebar a {
            display: block;
            color: #d1d5db;
            text-decoration: none;
            padding: 14px 24px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #374151;
            color: white;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: white;
            padding: 18px 30px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h1 {
            font-size: 24px;
            color: #111827;
        }

        .topbar .user-text {
            color: #6b7280;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #374151;
            font-size: 18px;
        }

        .card p {
            font-size: 26px;
            font-weight: bold;
            color: #111827;
        }

        .section-title {
            margin-bottom: 20px;
            color: #111827;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2>Gym System</h2>
            <a href="/dashboard/">Dashboard</a>
            <a href="/welcome/">Welcome</a>
            <a href="/billing/">Billing</a>
            <a href="/billing/members/">Billing Members</a>
            <a href="/billing/plans/">Membership Plans</a>
            <a href="/billing/payments/">Payments</a>
            <a href="/classes/">Classes</a>
            <a href="/trainers/assignments/">Trainers</a>
            <a href="/subscriptions/my-subscription/">My Subscription</a>
            <a href="/edit-profile/">Edit Profile</a>
            <a href="/logout/">Logout</a>
        </div>

        <div class="main">
            <div class="topbar">
                <h1>{% block page_title %}Dashboard{% endblock %}</h1>
                <div class="user-text">Gym Management Admin Panel</div>
            </div>

            <div class="content">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
