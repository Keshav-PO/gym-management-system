<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FitZone Gym{% endblock %}</title>
    <style>
        :root {
            --primary: #ff4d4d;
            --primary-dark: #e63939;
            --dark: #111111;
            --dark-soft: #1f2937;
            --text: #222222;
            --muted: #666666;
            --bg: #f3f4f6;
            --white: #ffffff;
            --border: #d1d5db;
            --shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            --radius: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            line-height: 1.6;
            color: var(--text);
            background-color: var(--bg);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        .navbar {
            background: var(--dark);
            color: var(--white);
            padding: 18px 0;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--white);
            font-size: 15px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary) !important;
        }

        .btn-login:hover {
            background: var(--primary);
            color: var(--white) !important;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white) !important;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .page-section {
            min-height: calc(100vh - 140px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
        }

        .form-card,
        .content-card {
            background: var(--white);
            width: 100%;
            max-width: 550px;
            margin: auto;
            padding: 35px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .form-card h2,
        .content-card h2 {
            margin-bottom: 10px;
            color: var(--dark);
            text-align: center;
            font-size: 24px;
        }

        .form-card p,
        .content-card p {
            text-align: center;
            color: var(--muted);
            margin-bottom: 25px;
        }

        .form-card label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333333;
        }

        .form-card input,
        .form-card select,
        .form-card textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 15px;
        }

        .form-card input:focus,
        .form-card select:focus,
        .form-card textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-card button,
        .primary-btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: var(--primary);
            color: var(--white);
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .form-card button:hover,
        .primary-btn:hover {
            background: var(--primary-dark);
        }

        .helper-text {
            margin-top: 15px;
            text-align: center;
            color: var(--muted);
        }

        .helper-text a {
            color: var(--primary);
            font-weight: bold;
        }

        .message-success {
            background: #e8f9ee;
            color: #1b7f46;
            border: 1px solid #b7ebc8;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 18px;
        }

        .message-error {
            background: #fdecec;
            color: #b42318;
            border: 1px solid #f5c2c7;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 18px;
        }

        .footer {
            background: #000000;
            color: #bbbbbb;
            text-align: center;
            padding: 18px 0;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-card,
            .content-card {
                padding: 25px;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="{% url 'home' %}" class="logo">FitZone Gym</a>

            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>

                {% if user.is_authenticated %}
                    {% if user.is_staff or user.is_superuser %}
                        <a href="{% url 'admin_dashboard' %}">Dashboard</a>
                    {% else %}
                        <a href="{% url 'member_dashboard' %}">Dashboard</a>
                        <a href="{% url 'edit_profile' %}">Edit Profile</a>
                    {% endif %}
                    <a href="{% url 'logout' %}" class="btn btn-login">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}" class="btn btn-primary">Join Now</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <div class="footer">
        <div class="container">
            &copy; 2026 FitZone Gym. All rights reserved.
        </div>
    </div>

</body>
</html>
