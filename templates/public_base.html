<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FitZone Gym{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            line-height: 1.6;
            color: #222;
            background-color: #f7f7f7;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        .navbar {
            background: #111;
            color: #fff;
            padding: 18px 0;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ff4d4d;
        }

        .nav-links {
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            font-size: 15px;
        }

        .nav-links a:hover {
            color: #ff4d4d;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn-login {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d !important;
        }

        .btn-login:hover {
            background: #ff4d4d;
            color: white !important;
        }

        .btn-primary {
            background: #ff4d4d;
            color: white !important;
        }

        .btn-primary:hover {
            background: #e63939;
        }

        .page-section {
            min-height: calc(100vh - 140px);
            display: flex;
            align-items: center;
            padding: 50px 0;
        }

        .form-card {
            background: white;
            width: 100%;
            max-width: 500px;
            margin: auto;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }

        .form-card h2 {
            margin-bottom: 10px;
            color: #111;
            text-align: center;
        }

        .form-card p {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        .form-card label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        .form-card input,
        .form-card select,
        .form-card textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .form-card button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #ff4d4d;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .form-card button:hover {
            background: #e63939;
        }

        .helper-text {
            margin-top: 15px;
            text-align: center;
            color: #666;
        }

        .helper-text a {
            color: #ff4d4d;
            font-weight: bold;
        }

        .message-success {
            background: #e8f9ee;
            color: #1b7f46;
            border: 1px solid #b7ebc8;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 18px;
        }

        .message-error {
            background: #fdecec;
            color: #b42318;
            border: 1px solid #f5c2c7;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 18px;
        }

        .footer {
            background: #000;
            color: #bbb;
            text-align: center;
            padding: 18px 0;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="{% url 'home' %}" class="logo">FitZone Gym</a>

            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>

                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}">Dashboard</a>
                    <a href="{% url 'edit_profile' %}">Edit Profile</a>
                    <a href="{% url 'logout' %}" class="btn btn-login">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}" class="btn btn-primary">Join Now</a>
                {% endif %}
            </div>
        </div>

        

    

    </nav>

    {% block content %}
    {% endblock %}

    <div class="footer">
        <div class="container">
            &copy; 2026 FitZone Gym. All rights reserved.
        </div>
    </div>

</body>
</html>
